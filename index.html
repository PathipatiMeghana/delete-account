<!DOCTYPE html>
<html>
<head>
    <title>Delete Account</title>
</head>

<body>

    <center>
        <h1>Delete Your Antibiotic Resistance Pattern Analysis Account</h1>

        <p>
            We're sorry to see you go. Please submit this form to request 
            permanent deletion of your account.
        </p>

        <form>
            <br>

            <input type="text" placeholder="Enter your full name" required>
            <br><br>

            <input type="email" placeholder="Enter your registered email" required>
            <br><br>

            <input type="tel" placeholder="Registered phone number" required>
            <br><br>

            <textarea placeholder="Reason for leaving (optional)" rows="4" cols="30"></textarea>
            <br><br>

            <button type="submit">Delete My Account</button>

        </form>
    </center>

</body>
</html>
